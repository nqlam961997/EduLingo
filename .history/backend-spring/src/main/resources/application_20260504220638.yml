server:
  port: 8080

spring:
  application:
    name: edulingo-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/edulingo}
    username: ${DB_USER:edulingo}
    password: ${DB_PASSWORD:edulingo}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  codec:
    max-in-memory-size: 16MB

gemini:
  api-key: ${GEMINI_API_KEY:}
  base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}
  model: ${GEMINI_MODEL:gemini-2.5-flash}

cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}
