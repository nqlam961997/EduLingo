server {
    listen       80;
    server_name  _;

    # Static SPA assets ------------------------------------------------------
    root   /usr/share/nginx/html;
    index  index.html;

    # Larger TTS audio bodies are returned from /ai/tts; allow generous limits.
    client_max_body_size 16m;

    # SPA fallback so Vue Router HTML5 history mode resolves deep links.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Spring Boot backend ----------------------------------------------------
    # No trailing slash on proxy_pass: Spring controllers are already mapped
    # under /api/ (e.g. @RequestMapping("/api/auth")), so we forward the path
    # unchanged.
    location /api/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Streaming-friendly defaults — Spring SSE / chunked responses.
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    # FastAPI ai-proxy -------------------------------------------------------
    location /ai/ {
        proxy_pass         http://ai-proxy:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Ollama streaming + TTS audio — disable buffering and bump timeouts.
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 300s;
    }
}
