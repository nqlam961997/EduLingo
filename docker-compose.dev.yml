# Dev overlay — hot reload + source bind-mounts.
#
# Usage:  docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# What this overlay does:
#   - Replaces built frontend with Vite dev server on :5173
#   - Replaces built backend with Maven spring-boot:run (auto-restart on code change)
#   - Replaces ai-proxy with uvicorn --reload
#   - Exposes Postgres on :5432 for psql debugging
#   - Disables Caddy (dev hits services directly on their host-bound ports)

services:
  postgres:
    ports:
      - "5432:5432"
    restart: "no"

  ollama:
    restart: "no"

  ai-proxy:
    restart: "no"
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - ./backend-python:/app:rw
    ports:
      - "8000:8000"

  backend:
    restart: "no"
    image: maven:3.9-eclipse-temurin-17
    user: "0:0"
    working_dir: /workspace
    command: ["mvn", "-B", "-ntp", "spring-boot:run"]
    volumes:
      - ./backend-spring:/workspace:rw
      - backend_m2:/root/.m2
    ports:
      - "8080:8080"
    # Skip the multi-stage build entirely in dev — Maven runs the app in-place.
    build: !reset null

  frontend:
    restart: "no"
    image: node:20-alpine
    working_dir: /app
    command: ["sh", "-c", "npm ci && npm run dev -- --host 0.0.0.0"]
    volumes:
      - ./frontend-vue:/app:rw
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    expose: !reset []
    build: !reset null

  # Caddy is not needed in dev — devs hit Vite on :5173 directly. Override the
  # image with a no-op so docker compose still treats the service as defined
  # but it exits immediately.
  caddy:
    image: alpine
    command: ["sh", "-c", "echo 'Caddy disabled in dev overlay'; sleep infinity"]
    ports: !reset []
    volumes: !reset []
    depends_on: !reset []
    restart: "no"

volumes:
  backend_m2:
  frontend_node_modules:
