services:
  postgres:
    image: postgres:16-alpine
    container_name: edulingo-postgres
    environment:
      POSTGRES_DB: edulingo
      POSTGRES_USER: edulingo
      POSTGRES_PASSWORD: edulingo
    ports:
      - "5432:5432"
    volumes:
      - edulingo_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edulingo -d edulingo"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  edulingo_pg:
